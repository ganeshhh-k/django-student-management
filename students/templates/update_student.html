<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Add Students</title>
</head>
<body>
    {% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3>
                <i class="bi bi-pencil-square"></i>
                Update Student
            </h3>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <!-- Roll Number -->

                <div class="mb-3">

                    <label class="form-label">
                        Roll Number
                    </label>

                    <input
                        type="text"
                        name="roll_no"
                        class="form-control"
                        value="{{ student.roll_no }}"
                        required>

                </div>

                <!-- Student Name -->

                <div class="mb-3">

                    <label class="form-label">
                        Student Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        value="{{ student.name }}"
                        required>

                </div>

                <!-- Branch -->

                <div class="mb-3">

                    <label class="form-label d-block">
                        Branch
                    </label>

                    <div class="form-check form-check-inline">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="branch"
                            value="CSE"
                            {% if student.branch == "CSE" %}checked{% endif %}>

                        <label class="form-check-label">
                            CSE
                        </label>

                    </div>

                    <div class="form-check form-check-inline">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="branch"
                            value="ECE"
                            {% if student.branch == "ECE" %}checked{% endif %}>

                        <label class="form-check-label">
                            ECE
                        </label>

                    </div>

                    <div class="form-check form-check-inline">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="branch"
                            value="EEE"
                            {% if student.branch == "EEE" %}checked{% endif %}>

                        <label class="form-check-label">
                            EEE
                        </label>

                    </div>

                    <div class="form-check form-check-inline">

                        <input
                            class="form-check-input"
                            type="radio"
                            name="branch"
                            value="AIML"
                            {% if student.branch == "AIML" %}checked{% endif %}>

                        <label class="form-check-label">
                            AIML
                        </label>

                    </div>

                </div>

                <!-- Semester -->

                <div class="mb-3">

                    <label class="form-label">
                        Semester
                    </label>

                    <select
                        name="semester"
                        class="form-select"
                        required>

                        <option value="">Select Semester</option>

                        {% for i in "12345678" %}

                        <option
                            value="{{ i }}"
                            {% if student.semester|stringformat:"s" == i %}selected{% endif %}>

                            Semester {{ i }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- Active -->

                <div class="form-check form-switch mb-4">

                    <input
                        class="form-check-input"
                        type="checkbox"
                        name="active"
                        id="active"
                        {% if student.active %}checked{% endif %}>

                    <label
                        class="form-check-label"
                        for="active">

                        Active Student

                    </label>

                </div>

                <!-- Buttons -->

                <button
                    type="submit"
                    class="btn btn-warning">

                    <i class="bi bi-check-circle"></i>

                    Update Student

                </button>

                <a
                    href="/"
                    class="btn btn-secondary">

                    <i class="bi bi-arrow-left"></i>

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
</body>
</html>
