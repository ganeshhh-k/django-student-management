<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5" style="max-width:500px;">

<h2 class="mb-4">

Login

</h2>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-primary w-100">

Login

</button>

</form>

<p class="mt-3 text-center">

Don't have an account?

<a href="/accounts/register/">

Register

</a>

</p>

</div>

</body>
</html>
