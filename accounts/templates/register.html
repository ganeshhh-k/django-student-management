<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5" style="max-width:500px;">

<h2 class="mb-4">Register</h2>

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Confirm Password

</label>

<input
type="password"
name="confirm_password"
class="form-control"
required>

</div>

<button class="btn btn-success w-100">

Register

</button>
<p>have an account? <a href="/accounts/login/">Login here</a></p>

</form>

</div>

</body>
</html>
